<title>Vidhyaan Mobile — P1 Wireframes</title>
<style>
:root{
  --paper:#F8FAFC; --panel:#FFFFFF; --ink:#0F172A; --ink2:#475569; --ink3:#94A3B8;
  --line:#CBD5E1; --line2:#E2E8F0; --fill:#E8F0FC; --fill2:#F1F5F9;
  --hot:#1565D8; --hot-bg:rgba(21,101,216,.09);
  --good:#16A34A; --good-bg:#EAF7EE; --bad:#DC2626; --bad-bg:#FDECEC; --warn:#B45309; --warn-bg:#FDF3E3;
}
@media (prefers-color-scheme: dark){:root{
  --paper:#0F1520; --panel:#1A2230; --ink:#E8EEF7; --ink2:#A9B7CA; --ink3:#68788F;
  --line:#3D4B60; --line2:#2A3547; --fill:#213047; --fill2:#212B3B;
  --hot:#5B9BF0; --hot-bg:rgba(91,155,240,.14);
  --good:#4ADE80; --good-bg:rgba(74,222,128,.13); --bad:#F87171; --bad-bg:rgba(248,113,113,.13); --warn:#FBBF24; --warn-bg:rgba(251,191,36,.13);
}}
:root[data-theme="dark"]{
  --paper:#0F1520; --panel:#1A2230; --ink:#E8EEF7; --ink2:#A9B7CA; --ink3:#68788F;
  --line:#3D4B60; --line2:#2A3547; --fill:#213047; --fill2:#212B3B;
  --hot:#5B9BF0; --hot-bg:rgba(91,155,240,.14);
  --good:#4ADE80; --good-bg:rgba(74,222,128,.13); --bad:#F87171; --bad-bg:rgba(248,113,113,.13); --warn:#FBBF24; --warn-bg:rgba(251,191,36,.13);
}
:root[data-theme="light"]{
  --paper:#F8FAFC; --panel:#FFFFFF; --ink:#0F172A; --ink2:#475569; --ink3:#94A3B8;
  --line:#CBD5E1; --line2:#E2E8F0; --fill:#E8F0FC; --fill2:#F1F5F9;
  --hot:#1565D8; --hot-bg:rgba(21,101,216,.09);
  --good:#16A34A; --good-bg:#EAF7EE; --bad:#DC2626; --bad-bg:#FDECEC; --warn:#B45309; --warn-bg:#FDF3E3;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
  font:14px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

/* ===== chrome layout ===== */
.wrap{display:grid;grid-template-columns:250px minmax(0,1fr) 300px;gap:0;min-height:100vh}
.rail,.notes{padding:20px 18px;overflow-y:auto;max-height:100vh;position:sticky;top:0}
.rail{border-right:1px solid var(--line2)}
.notes{border-left:1px solid var(--line2)}
.stage{display:flex;flex-direction:column;align-items:center;padding:26px 16px 40px;gap:14px}
h1{font-size:15px;font-weight:700;margin:0 0 2px}
.sub{font-size:12px;color:var(--ink2);margin:0 0 18px}
.jname{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink3);margin:16px 0 6px}
.slink{display:block;width:100%;text-align:left;background:none;border:0;color:var(--ink2);
  padding:5px 8px;border-radius:6px;cursor:pointer;font:12px/1.3 ui-monospace,Menlo,monospace}
.slink:hover{background:var(--fill2);color:var(--ink)}
.slink.on{background:var(--hot-bg);color:var(--hot);font-weight:600}
.notes h2{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink3);margin:0 0 10px}
.notes .nid{font-size:12px;color:var(--hot);margin:0 0 4px;font-weight:600}
.notes ul{margin:8px 0 0;padding-left:16px;color:var(--ink2);font-size:12.5px}
.notes li{margin-bottom:7px}
.legend{margin-top:26px;padding-top:14px;border-top:1px solid var(--line2);font-size:11.5px;color:var(--ink3)}
.legend b{color:var(--hot);font-weight:600}

/* ===== phone frame ===== */
.phone{width:392px;max-width:100%;background:var(--panel);border:2px solid var(--line);
  border-radius:34px;overflow:hidden;box-shadow:0 18px 44px rgba(20,30,48,.12)}
.statusbar{display:flex;justify-content:space-between;padding:9px 22px 5px;
  font-size:11px;color:var(--ink3)}
.screen{height:730px;overflow-y:auto;display:flex;flex-direction:column}
.crumbs{display:flex;gap:8px;align-items:center;padding:6px 4px 0;width:392px;max-width:100%}
.crumbs button{border:1px solid var(--line2);background:var(--panel);color:var(--ink2);
  border-radius:7px;padding:4px 12px;font-size:12px;cursor:pointer}
.crumbs button:hover{border-color:var(--hot);color:var(--hot)}
.crumbs .path{font-size:11px;color:var(--ink3);margin-left:auto}

/* ===== wireframe primitives ===== */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line2)}
.hdr .t{font-size:17px;font-weight:700;flex:1}
.back{width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:none;
  color:var(--ink2);cursor:pointer;font-size:15px;line-height:1;flex:none}
.bell{position:relative;width:34px;height:34px;border:1px solid var(--line);border-radius:50%;
  background:none;color:var(--ink2);cursor:pointer;font-size:15px;flex:none}
.bell .dot{position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;border-radius:9px;
  background:var(--bad);color:#fff;font-size:10px;font-weight:700;line-height:17px;padding:0 4px}
.bar{height:10px;border:1px solid var(--line2);border-radius:5px;background:
  linear-gradient(to right,var(--hot) var(--w,60%),var(--fill2) var(--w,60%))}
.body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;flex:1}
.card{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:var(--panel)}
.row{display:flex;align-items:center;gap:11px}
.grow{flex:1;min-width:0}
.ava{width:40px;height:40px;border:1px solid var(--line2);border-radius:50%;flex:none;background:var(--fill)}
.img{border:1px solid var(--line);border-radius:10px;background:
  linear-gradient(to top right,transparent calc(50% - .5px),var(--line2) calc(50% - .5px),var(--line2) calc(50% + .5px),transparent calc(50% + .5px)),
  linear-gradient(to bottom right,transparent calc(50% - .5px),var(--line2) calc(50% - .5px),var(--line2) calc(50% + .5px),transparent calc(50% + .5px)),var(--fill2)}
.h2{font-size:15px;font-weight:700;margin:0}
.h3{font-size:13.5px;font-weight:600;margin:0}
.cap{font-size:12px;color:var(--ink2)}
.tiny{font-size:11px;color:var(--ink3)}
.lbl{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3)}
.num{font-size:24px;font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.chip{display:inline-block;border:1px solid var(--line);border-radius:999px;
  padding:2px 10px;font-size:11px;font-weight:600;color:var(--ink2)}
.chip.g{color:var(--good);border-color:transparent;background:var(--good-bg)}
.chip.r{color:var(--bad);border-color:transparent;background:var(--bad-bg)}
.chip.y{color:var(--warn);border-color:transparent;background:var(--warn-bg)}
.chip.sel{background:var(--hot);color:#fff;border-color:var(--hot)}
.field{border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--ink3);
  font-size:14px;background:var(--panel)}
.field b{color:var(--ink);font-weight:500}
.btn{display:block;width:100%;text-align:center;border:1.5px solid var(--hot);border-radius:11px;
  padding:12px;font-size:14px;font-weight:700;color:var(--hot);background:var(--panel);cursor:pointer}
.btn.pri{background:var(--hot);color:#fff}
.btn.sm{padding:8px;font-size:13px;border-radius:9px;width:auto;flex:1}
.hr{border:0;border-top:1px solid var(--line2);margin:2px 0}
.otp{display:flex;gap:8px;justify-content:center}
.otp span{width:42px;height:50px;border:1px solid var(--line);border-radius:9px;background:var(--panel)}
.tabbar{display:flex;border-top:1px solid var(--line2);margin-top:auto;background:var(--panel)}
.tab{flex:1;padding:9px 2px 11px;text-align:center;font-size:10.5px;color:var(--ink3);cursor:pointer;border:0;background:none}
.tab .ic{display:block;width:22px;height:22px;border:1.5px solid currentColor;border-radius:6px;margin:0 auto 3px;opacity:.8}
.tab.on{color:var(--hot);font-weight:700}
.fab{position:sticky;bottom:14px;align-self:flex-end;width:52px;height:52px;border-radius:50%;
  border:0;background:var(--hot);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 6px 16px rgba(21,101,216,.35)}
.grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}
.day{border:1px solid var(--line2);border-radius:7px;padding:6px 0;font-size:11.5px;font-variant-numeric:tabular-nums}
.day.p{background:var(--good-bg);border-color:transparent;color:var(--good)}
.day.a{border-color:var(--bad);color:var(--bad);font-weight:700}
.day.h{color:var(--ink3);border-style:dashed}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.stu{border:1px solid var(--line);border-radius:9px;padding:8px 3px;text-align:center;font-size:10.5px;cursor:pointer}
.stu.ab{border-color:var(--bad);color:var(--bad);font-weight:700;background:var(--bad-bg)}
.stu:not(.ab){background:var(--fill2)}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.split{display:flex;justify-content:space-between;align-items:baseline;font-size:13px}
.split .v{font-weight:600;font-variant-numeric:tabular-nums}
.check{width:64px;height:64px;border:2px solid var(--good);border-radius:50%;margin:14px auto 4px;
  display:flex;align-items:center;justify-content:center;color:var(--good);font-size:30px}
.sheet{margin-top:auto;border-top:2px solid var(--line);border-radius:18px 18px 0 0;
  padding:16px;background:var(--panel);display:flex;flex-direction:column;gap:10px}
.center{text-align:center}
.logo{width:72px;height:72px;display:block;margin:0 auto}
.logo-sm{width:26px;height:26px;vertical-align:-6px;margin-right:8px}
.wordmark{font-size:21px;font-weight:800;letter-spacing:-.02em;color:var(--hot)}

/* hotspot */
[data-nav]{cursor:pointer;position:relative}
[data-nav]:hover{outline:2px dashed var(--hot);outline-offset:2px}
.hint [data-nav]{outline:2px dashed var(--hot);outline-offset:2px}
.hotbar{display:flex;gap:8px;align-items:center}
.hotbar label{font-size:11.5px;color:var(--ink3);display:flex;gap:5px;align-items:center;cursor:pointer}

@media (max-width:1100px){
  .wrap{grid-template-columns:1fr}
  .rail,.notes{position:static;max-height:none;border:0;border-bottom:1px solid var(--line2)}
  .rail{display:flex;flex-wrap:wrap;gap:4px 10px;align-items:center}
  .jname{margin:0}
  .slink{width:auto}
  .notes{order:3}
  .phone{border-radius:22px}
}
:focus-visible{outline:2px solid var(--hot);outline-offset:2px}
</style>

<div class="wrap">
  <nav class="rail" id="rail" aria-label="Screens"></nav>

  <main class="stage">
    <div class="crumbs">
      <button id="backBtn" aria-label="Go back">← Back</button>
      <span class="hotbar"><label><input type="checkbox" id="hintTgl"> show tap targets</label></span>
      <span class="path mono" id="pathLbl"></span>
    </div>
    <div class="phone" id="phoneWrap">
      <div class="statusbar"><span>9:41</span><span>▮▮▮ ⌁ 100%</span></div>
      <div class="screen" id="screen"></div>
    </div>
    <p class="tiny center" style="max-width:392px">Branded wireframes · v3 · tap any dashed-blue element to walk the flow. Layout + navigation only — visual design comes in hi-fi phase.</p>
  </main>

  <aside class="notes" id="notes"></aside>
</div>

  return `<div class="tabbar">`+def[j].map(([id,l])=>

const scr=document.getElementById('screen'),rail=document.getElementById('rail'),
      notes=document.getElementById('notes'),pathLbl=document.getElementById('pathLbl');
let stack=['login'];
function go(id,push=true){
  if(!S[id])return;
  if(push&&stack[stack.length-1]!==id)stack.push(id);
  if(stack.length>40)stack.shift();
  scr.innerHTML=S[id]();
  scr.scrollTop=0;
  pathLbl.textContent=id;
  document.querySelectorAll('.slink').forEach(b=>b.classList.toggle('on',b.dataset.s===id));
  notes.innerHTML=`<h2>Annotations</h2><p class="nid mono">${id} — ${TITLE[id]}</p>
    <ul>${(N[id]||[]).map(n=>`<li>${n}</li>`).join('')}</ul>
